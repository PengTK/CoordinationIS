name: MicronautCheck

on:
  push:
    branches: [ master ]

jobs:
  test:
    name: Test project build
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '21'
      - name: Install libs
        run: |
          echo "Начало теста билда"
          chmod +x gradlew
          ./gradlew build -x test --no-daemon
          echo "Тест билда завершён"
  lint:
    name: Test lint build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '21'
      - name: lint
        run: |
          echo "Начало теста синтаксиса"
          chmod +x gradlew
          ./gradlew checkstyleMain checkstyleTest
          echo "Конец теста синтаксиса"
  func:
    name: Test funcs build
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'liberica'
          java-version: '21'
      - name: function_secret
        run: |
          chmod +x gradlew
          grep -rE "(password|secret|token|apiKey)" --include="*.java" --include="*.yml" --include="*.properties" src/ config/ 2>/dev/null | grep -v "// " | grep -v "# "
      - name: function_TODO
        run: |
          grep -r "TODO" --include="*.java" --include="*.kt" src/main/ 2>/dev/null
    
    
    

