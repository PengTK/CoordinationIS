<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">COORDIS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
</head>
<body>
<header th:fragment="header(email, firstName, role, totalUnread)">
    <a href="/home" class="logo">COORDIS</a>

    <!-- Для авторизованных -->
    <div th:if="${email != null}" class="auth-buttons nav-right">
        <!-- Кнопка чатов с непрочитанными -->
        <a href="/chats" style="position: relative; margin-right: 1.5rem; color: #00bfff; text-decoration: none;">
            💬 Чаты
            <span th:if="${totalUnread != null && totalUnread > 0}"
                  style="background-color: #ff4d4d; color: white; border-radius: 10px; padding: 0.1rem 0.4rem; font-size: 0.8rem; margin-left: 0.3rem;">
        <span th:text="${totalUnread}"></span>
      </span>
        </a>

        <form method="post" action="/auth/logout" style="display: inline;">
                <button type="submit" style="background: none; border: none; color: #aaa; cursor: pointer;">Выйти</button>
        </form>
    </div>

    <!-- Для гостей -->
    <div th:unless="${email != null}" class="auth-buttons">
        <a href="/auth">Вход</a> | <a href="/reg">Регистрация</a>
    </div>
</header>
</body>
</html>
