<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>COORDIS — Разработка на заказ</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header(${email}, ${firstName}, ${role}, ${totalUnread})}"></div>

<main>
    <h1>COORDIS</h1>
    <p class="subtitle">Брутальная разработка. Чёткие дедлайны. Надёжные решения.</p>
    <div th:if="${role != null and role.userPermission != @com.den41k.model.RolePermission@NO_PERMS}">
        <a href="/admin/users" class="cta-button">Пользователи</a>
    </div>
    <div th:if="${role != null and role.rolePermission != @com.den41k.model.RolePermission@NO_PERMS}">
        <a href="/admin/roles" class="cta-button">Роли</a>
    </div>
    <div th:if="${role != null and role.projectPermission != @com.den41k.model.RolePermission@NO_PERMS}">
    <a href="projects" class="cta-button">Проекты</a>
    </div>
</main>

<footer>
    &copy; 2026 COORDIS. Все права защищены.
</footer>

</body>
</html>
